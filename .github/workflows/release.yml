name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-command: npm run dist -- --win --publish never
            artifact-name: windows
            artifact-path: |
              release/*.exe
          - os: macos-latest
            build-command: npm run dist -- --mac --publish never
            artifact-name: macos
            artifact-path: |
              release/*.dmg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.build-command }}
        env:
          # Normal compression is much faster than maximum; installers stay small enough.
          ELECTRON_BUILDER_COMPRESSION: normal
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibeboard-${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache git-cliff
        id: cache-git-cliff
        uses: actions/cache@v4
        with:
          path: .git-cliff
          key: git-cliff-2.13.1-linux

      - name: Install git-cliff
        if: steps.cache-git-cliff.outputs.cache-hit != 'true'
        run: |
          mkdir -p .git-cliff
          curl -LsSf https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-x86_64-unknown-linux-gnu.tar.gz -o git-cliff.tar.gz
          tar xzf git-cliff.tar.gz -C .git-cliff --strip-components=1
          chmod +x .git-cliff/git-cliff

      - name: Generate changelog
        run: |
          .git-cliff/git-cliff --config cliff.toml --latest --strip header --output CHANGELOG.md
          test -s CHANGELOG.md

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          prerelease_flags=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease_flags+=(--prerelease)
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "VibeBoard ${GITHUB_REF_NAME}" \
              --notes-file CHANGELOG.md \
              "${prerelease_flags[@]}"
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "VibeBoard ${GITHUB_REF_NAME}" \
              --notes-file CHANGELOG.md \
              "${prerelease_flags[@]}"
          fi
