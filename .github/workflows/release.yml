name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-command: npm run dist -- --win --publish never
            artifact-name: windows
            artifact-path: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
          - os: macos-latest
            build-command: npm run dist -- --mac --publish never
            artifact-name: macos
            artifact-path: |
              release/*.dmg
              release/*.dmg.blockmap
              release/latest-mac.yml

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.build-command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibeboard-${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          curl -LsSf https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-x86_64-unknown-linux-gnu.tar.gz -o git-cliff.tar.gz
          tar xzf git-cliff.tar.gz
          CLIFF_BIN="$(find . -maxdepth 2 -type f -name git-cliff | head -1)"
          chmod +x "$CLIFF_BIN"
          "$CLIFF_BIN" --config cliff.toml --latest --strip header --output CHANGELOG.md
          test -s CHANGELOG.md

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: VibeBoard ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
