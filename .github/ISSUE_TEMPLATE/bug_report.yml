name: Bug report
description: Report something broken in VibeBoard.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path that triggers the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should happen?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Boards and lanes
        - Projects and tabs
        - Tasks and chat
        - Code changes / diffs
        - Agent CLIs
        - Run modes and worktrees
        - Search
        - Notifications
        - Notch overlay (macOS)
        - Keyboard backlight (macOS)
        - Appearance
        - Updates and releases
        - Packaging / installers
        - Other
    validations:
      required: true

  - type: dropdown
    id: agent_cli
    attributes:
      label: Agent CLI
      description: Which agent CLI were you using (if relevant)?
      options:
        - Cursor
        - Claude Code
        - Codex
        - Not sure / N/A
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: VibeBoard version
      description: From About / the release you installed.
      placeholder: "0.1.17"

  - type: textarea
    id: attachments
    attributes:
      label: Screenshots, video, or logs
      description: Add anything that makes the bug easier to verify.
