name: Bug report
description: Report something broken in VibeBoard.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path that triggers the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should happen?

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: VibeBoard version
      placeholder: "0.1.5"

  - type: textarea
    id: attachments
    attributes:
      label: Screenshots, video, or logs
      description: Add anything that makes the bug easier to verify.
